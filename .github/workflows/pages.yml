name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build:libs

      - name: Build demo (site root)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_OUT_DIR: ../../dist
        run: pnpm --filter @yoga-canvas/demo build

      - name: Build editor (sub path)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/editor/
          VITE_OUT_DIR: ../../dist/editor
        run: pnpm --filter @yoga-canvas/editor build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
